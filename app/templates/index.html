<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskAPI - Task Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            min-width: 200px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            margin-top: 10px;
            resize: vertical;
            font-family: inherit;
            min-height: 80px;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        button:hover {
            background: #5a6fd6;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button.delete {
            background: #ff4757;
            padding: 6px 12px;
            font-size: 0.85rem;
        }

        button.delete:hover {
            background: #e84148;
        }

        button.complete {
            background: #2ed573;
            padding: 6px 12px;
            font-size: 0.85rem;
        }

        button.complete:hover {
            background: #26b864;
        }

        .task-count {
            text-align: center;
            color: #666;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .task-list {
            list-style: none;
        }

        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            border-bottom: 1px solid #eee;
            gap: 10px;
        }

        .task-item:last-child {
            border-bottom: none;
        }

        .task-item.completed .task-title {
            text-decoration: line-through;
            color: #999;
        }

        .task-info {
            flex: 1;
        }

        .task-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .task-description {
            font-size: 0.85rem;
            color: #777;
        }

        .task-actions {
            display: flex;
            gap: 5px;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px;
            font-size: 1.1rem;
        }

        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .filter-bar button {
            background: #f0f0f0;
            color: #333;
            padding: 8px 16px;
        }

        .filter-bar button:hover,
        .filter-bar button.active {
            background: #667eea;
            color: white;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 25px;
            background: #2ed573;
            color: white;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .toast.show {
            opacity: 1;
        }

        .toast.error {
            background: #ff4757;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>TaskAPI - Task Manager</h1>

        <div class="card">
            <form id="taskForm">
                <div class="form-group">
                    <input type="text" id="taskTitle" placeholder="Enter task title..." required>
                    <button type="submit">Add Task</button>
                </div>
                <textarea id="taskDescription" placeholder="Enter task description (optional)..."></textarea>
            </form>
        </div>

        <div class="card">
            <p class="task-count" id="taskCount">Loading tasks...</p>
            <div class="filter-bar">
                <button class="active" onclick="filterTasks('all')">All</button>
                <button onclick="filterTasks('pending')">Pending</button>
                <button onclick="filterTasks('completed')">Completed</button>
            </div>
            <ul class="task-list" id="taskList">
                <li class="empty-state">No tasks yet. Add one above!</li>
            </ul>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API_URL = '/api/tasks';
        let currentFilter = 'all';
        let tasks = [];

        // Load tasks on page load
        document.addEventListener('DOMContentLoaded', loadTasks);

        // Handle form submit
        document.getElementById('taskForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('taskTitle').value.trim();
            const description = document.getElementById('taskDescription').value.trim();

            if (!title) return;

            await createTask(title, description);
            document.getElementById('taskTitle').value = '';
            document.getElementById('taskDescription').value = '';
        });

        async function loadTasks() {
            try {
                const response = await fetch(API_URL);
                tasks = await response.json();
                renderTasks();
            } catch (error) {
                showToast('Failed to load tasks', true);
            }
        }

        async function createTask(title, description) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, description })
                });
                const newTask = await response.json();
                tasks.unshift(newTask);
                renderTasks();
                showToast('Task added!');
            } catch (error) {
                showToast('Failed to add task', true);
            }
        }

        async function toggleComplete(taskId, currentStatus) {
            try {
                await fetch(`${API_URL}/${taskId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ completed: !currentStatus })
                });
                const task = tasks.find(t => t.id === taskId);
                if (task) task.completed = !currentStatus;
                renderTasks();
                showToast('Task updated!');
            } catch (error) {
                showToast('Failed to update task', true);
            }
        }

        async function deleteTask(taskId) {
            try {
                await fetch(`${API_URL}/${taskId}`, { method: 'DELETE' });
                tasks = tasks.filter(t => t.id !== taskId);
                renderTasks();
                showToast('Task deleted!');
            } catch (error) {
                showToast('Failed to delete task', true);
            }
        }

        function filterTasks(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-bar button').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.toLowerCase() === filter);
            });
            renderTasks();
        }

        function renderTasks() {
            const taskList = document.getElementById('taskList');
            const taskCount = document.getElementById('taskCount');

            let filtered = tasks;
            if (currentFilter === 'pending') {
                filtered = tasks.filter(t => !t.completed);
            } else if (currentFilter === 'completed') {
                filtered = tasks.filter(t => t.completed);
            }

            const pending = tasks.filter(t => !t.completed).length;
            const completed = tasks.filter(t => t.completed).length;
            taskCount.textContent = `${pending} pending, ${completed} completed`;

            if (filtered.length === 0) {
                taskList.innerHTML = '<li class="empty-state">No tasks found.</li>';
                return;
            }

            taskList.innerHTML = filtered.map(task => `
                <li class="task-item ${task.completed ? 'completed' : ''}">
                    <div class="task-info">
                        <div class="task-title">${escapeHtml(task.title)}</div>
                        ${task.description ? `<div class="task-description">${escapeHtml(task.description)}</div>` : ''}
                    </div>
                    <div class="task-actions">
                        <button class="complete" onclick="toggleComplete(${task.id}, ${task.completed})">
                            ${task.completed ? 'Undo' : 'Complete'}
                        </button>
                        <button class="delete" onclick="deleteTask(${task.id})">Delete</button>
                    </div>
                </li>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast' + (isError ? ' error' : '') + ' show';
            setTimeout(() => { toast.className = 'toast'; }, 2500);
        }
    </script>
</body>
</html>
