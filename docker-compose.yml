version: "3.9"

services:
  # ── PostgreSQL database ──────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: taskapi_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: taskpassword
      POSTGRES_DB: taskdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskuser -d taskdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Flask API ────────────────────────────────────────────
  api:
    build:
      context: .
      target: runtime
    container_name: taskapi_app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://taskuser:taskpassword@db:5432/taskdb
      FLASK_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "flask db upgrade && gunicorn --bind 0.0.0.0:5000 --workers 4 wsgi:app"

volumes:
  postgres_data:
